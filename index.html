<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#06101F" />
    <meta name="color-scheme" content="dark" />

    <!-- =============================================================
         PRIMARY SEO META
         ============================================================= -->
    <title>iProtector — Marketplace de segurança, proteção executiva e monitoramento robótico</title>
    <meta
      name="description"
      content="Plataforma de tecnologia para agenciamento de Proteção Pessoal, Patrimonial e Monitoramento Robótico com Treinamentos de Elite. Marketplace nacional de segurança, Security as a Service, banco de protetores e captação de investimentos LEGALCERT."
    />
    <meta
      name="keywords"
      content="iProtector, marketplace de segurança, proteção executiva, proteção pessoal, segurança patrimonial, monitoramento robótico, security as a service, drone dock, torres de vigilância, banco de protetores, treinamento de elite, executive protection, escolta executiva, veículos blindados, captação investimentos LEGALCERT, segurança corporativa, condomínios, fazendas, resorts"
    />
    <meta name="author" content="iProtector" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Canonical & alternates (URL ajustada no build via VITE_SITE_URL) -->
    <link rel="canonical" href="%VITE_SITE_URL%/" />
    <link rel="alternate" hreflang="pt-BR" href="%VITE_SITE_URL%/" />
    <link rel="alternate" hreflang="x-default" href="%VITE_SITE_URL%/" />

    <!-- =============================================================
         OPEN GRAPH (WhatsApp, Facebook, LinkedIn, Telegram, Discord)
         ============================================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="iProtector" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="iProtector — Marketplace de segurança e monitoramento robótico" />
    <meta
      property="og:description"
      content="Agenciamento de Proteção Pessoal, Patrimonial e Monitoramento Robótico com Treinamentos de Elite. Conectamos clientes, empresas de segurança e agentes protetores em um ecossistema nacional."
    />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.png" />
    <meta property="og:image:secure_url" content="%VITE_SITE_URL%/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="iProtector — Marketplace nacional de segurança e monitoramento robótico" />

    <!-- =============================================================
         TWITTER / X CARD
         ============================================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@iprotector" />
    <meta name="twitter:creator" content="@iprotector" />
    <meta name="twitter:title" content="iProtector — Marketplace de segurança e monitoramento robótico" />
    <meta
      name="twitter:description"
      content="Proteção executiva, monitoramento robótico SaaS, banco de protetores e treinamento de elite. O maior ecossistema de segurança do Brasil."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.png" />
    <meta name="twitter:image:alt" content="iProtector — Marketplace nacional de segurança" />

    <!-- =============================================================
         FAVICONS + PWA
         ============================================================= -->
    <link rel="icon" type="image/svg+xml" href="/assets/iprotector-logo.svg" />
    <link rel="alternate icon" type="image/png" href="/assets/iprotector-mark-gold.png" />
    <link rel="apple-touch-icon" href="/assets/iprotector-mark-gold.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- =============================================================
         FONTES + PRELOAD
         ============================================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="image" type="image/png" href="/assets/hero-bg-source.png" />
    <link rel="preload" as="image" type="image/svg+xml" href="/assets/iprotector-logo.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- =============================================================
         JSON-LD — Structured Data
         ============================================================= -->
    <script type="application/ld+json">

        "logo": "%VITE_SITE_URL%/assets/iprotector-logo-gold.png",
        "image": "%VITE_SITE_URL%/og-image.png",
        "description": "Plataforma de tecnologia para agenciamento de Proteção Pessoal, Patrimonial e Monitoramento Robótico com Treinamentos de Elite — marketplace nacional de segurança e Security as a Service.",
        "telephone": "+55-11-99719-4408",
        "taxID": "17.738.538/0001-09",
        "vatID": "17738538000109",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Av. Dr. Chucri Zaidan, 1649",
          "addressLocality": "São Paulo",
          "addressRegion": "SP",
          "postalCode": "04711-130",
          "addressCountry": "BR"
        },
        "areaServed": { "@type": "Country", "name": "Brasil" },
        "sameAs": [
          "https://www.instagram.com/iprotector",
          "https://www.linkedin.com/company/iprotector",
          "https://www.youtube.com/@iprotector"
        ],
        "contactPoint": [
          {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "telephone": "+55-11-99719-4408",
            "email": "contato@iprotector.com.br",
            "availableLanguage": ["pt-BR"],
            "areaServed": "BR"
          },
          {
            "@type": "ContactPoint",
            "contactType": "emergency",
            "telephone": "+55-11-99719-4408",
            "availableLanguage": ["pt-BR"],
            "hoursAvailable": "Mo-Su 00:00-23:59"
          }
        ]
      }

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "@id": "%VITE_SITE_URL%/#localbusiness",
        "name": "iProtector",
        "image": "%VITE_SITE_URL%/og-image.png",
        "url": "%VITE_SITE_URL%",
        "telephone": "+55-11-99719-4408",
        "priceRange": "$$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Av. Dr. Chucri Zaidan, 1649",
          "addressLocality": "São Paulo",
          "addressRegion": "SP",
          "postalCode": "04711-130",
          "addressCountry": "BR"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": -23.6276,
          "longitude": -46.7032
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
            "opens": "00:00",
            "closes": "23:59"
          }
        ]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "iProtector",
        "url": "%VITE_SITE_URL%",
        "inLanguage": "pt-BR",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "%VITE_SITE_URL%/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Service",
        "serviceType": "Marketplace de Segurança e Security as a Service",
        "provider": { "@type": "Organization", "name": "iProtector" },
        "areaServed": { "@type": "Country", "name": "Brasil" },
        "description": "Agenciamento de proteção executiva, monitoramento robótico, banco de protetores e treinamento de elite com central 24h e tecnologia avançada.",
        "offers": [
          { "@type": "Offer", "name": "Plano Essential", "price": "18000", "priceCurrency": "BRL" },
          { "@type": "Offer", "name": "Plano Premium", "price": "35000", "priceCurrency": "BRL" },
          { "@type": "Offer", "name": "Plano Family Office", "price": "80000", "priceCurrency": "BRL" }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
